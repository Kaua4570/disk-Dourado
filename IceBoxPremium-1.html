<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IceBox Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    html, body { height: 100%; background: #080808; color: #fff; overflow-x: hidden; }
    body { font-family: 'Nunito', sans-serif; }

    /* ── ANIMATIONS ── */
    @keyframes cardIn    { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeSlide { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
    @keyframes modalIn   { from { opacity:0; transform:scale(.94) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes pillIn    { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse     { 0%,100%{opacity:1;} 50%{opacity:.5;} }

    .card-hover { transition: transform .18s, box-shadow .18s; cursor: default; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .pill-anim { animation: pillIn .3s ease; }
    .modal-anim { animation: modalIn .3s cubic-bezier(.34,1.2,.64,1); }

    /* ── FIXED BG ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    #bg-img {
      position: absolute;
      inset: -6%; width: 112%; height: 112%;
      background-size: cover; background-position: center;
      transition: filter .45s ease, transform .45s ease;
    }
    #bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.75) 0%, rgba(0,0,0,.88) 100%);
    }
    #bg-noise {
      position: absolute; inset: 0; opacity: .04; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── APP WRAPPER ── */
    #app {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto; min-height: 100dvh;
    }

    /* ── COMANDA BAR ── */
    #comanda-bar {
      position: sticky; top: 0; z-index: 40;
      background: rgba(0,0,0,.6); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 10px 12px 8px;
    }
    #comanda-bar .label {
      font-size: 10px; color: rgba(255,255,255,.4); letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    #comanda-scroll {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
    }
    .comanda-btn {
      flex-shrink: 0; padding: 5px 10px; border-radius: 10px;
      font-size: 11px; font-weight: 800; font-family: inherit;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.6);
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .comanda-btn.active {
      background: var(--accent-22);
      border-color: var(--accent-66);
      color: var(--accent);
    }
    .comanda-badge {
      margin-left: 5px; background: var(--accent); color: #000;
      border-radius: 999px; padding: 0 5px; font-size: 9px;
    }

    /* ── HEADER ── */
    #main-header {
      position: sticky; top: 80px; z-index: 30;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: rgba(0,0,0,.45); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    #main-header h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 26px;
      letter-spacing: .04em; line-height: 1.1;
    }
    #header-sub {
      font-size: 10px; text-transform: uppercase; letter-spacing: .16em;
      color: rgba(255,255,255,.4); line-height: 1;
    }
    #section-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      background: var(--accent-22); border: 1px solid var(--accent-55);
      color: var(--accent);
      animation: pillIn .3s ease;
    }
    #gear-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.09); border: 1.5px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; transition: all .2s; font-size: 18px;
      margin-left: 10px;
    }
    #gear-btn.active {
      background: rgba(245,200,66,.2); border-color: #f5c842; color: #f5c842;
    }

    /* ── EDIT BANNER ── */
    #edit-banner {
      background: rgba(245,200,66,.12); border: 1px solid rgba(245,200,66,.3);
      border-radius: 12px; margin: 10px 16px; padding: 8px 14px;
      font-size: 12px; color: #f5c842; font-weight: 700; display: none;
    }

    /* ── HERO STRIP ── */
    #hero-strip { padding: 14px 20px 6px; }
    #hero-section-name { font-size: 13px; font-weight: 700; color: var(--accent); animation: fadeSlide .4s ease; }
    #hero-comanda-info { font-size: 11px; color: rgba(255,255,255,.38); margin-top: 2px; }

    /* ── MAIN CONTENT ── */
    #product-list { padding-bottom: 120px; }

    .section-block { padding: 0 16px 24px; }
    .section-header {
      display: flex; align-items: center; gap: 12px; padding: 18px 0 4px;
    }
    .section-divider { height: 1px; flex: 1; opacity: .6; }
    .section-title {
      white-space: nowrap; font-size: 15px; font-weight: 900;
      color: #fff; letter-spacing: -.02em;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px; border-radius: 18px; margin-bottom: 10px;
      background: rgba(255,255,255,.05); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 4px 24px rgba(0,0,0,.32);
    }
    .product-img-wrap {
      width: 64px; height: 80px; border-radius: 12px; overflow: hidden;
      flex-shrink: 0; background: rgba(255,255,255,.08); position: relative;
    }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .edit-img-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.65);
      display: none; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; border-radius: 12px;
    }
    body.edit-mode .edit-img-overlay { display: flex; }
    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 14px; font-weight: 800; letter-spacing: -.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-sub {
      font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .product-price {
      font-size: 15px; font-weight: 900; margin-top: 4px;
    }
    input.edit-field {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px; color: #fff; padding: 2px 6px;
      font-family: inherit; font-size: inherit; font-weight: inherit;
    }
    input.edit-field:focus { outline: 2px solid #f5c842; }

    /* ── QTY CONTROLS ── */
    .qty-controls {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .btn-plus, .btn-minus {
      width: 34px; height: 34px; border-radius: 50%;
      font-size: 20px; font-weight: 900; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; transition: transform .15s; flex-shrink: 0;
    }
    .btn-plus { background: var(--accent); color: #000; }
    .btn-plus:active { transform: scale(.88); }
    .btn-minus {
      background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.15);
    }
    .qty-num {
      font-size: 14px; font-weight: 900; color: var(--accent);
    }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(0,0,0,.7); backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: stretch; z-index: 30;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 10px 2px; gap: 2px; cursor: pointer;
      background: transparent; border: none;
      border-top: 2px solid transparent; transition: all .2s;
    }
    .nav-btn.active { border-top-color: var(--nav-accent); }
    .nav-btn span.emoji { font-size: 18px; }
    .nav-btn span.label {
      font-size: 9px; font-weight: 700; color: rgba(255,255,255,.4);
      letter-spacing: .05em;
    }
    .nav-btn.active span.label { color: var(--nav-accent); }

    /* ── QR FLOAT BTN ── */
    #qr-float-btn {
      position: fixed; bottom: 76px; right: calc(50% - 230px);
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,.12); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,.5); z-index: 35;
    }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.75); display: none;
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: rgba(20,20,20,.95); backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,.12); border-radius: 24px;
      padding: 28px; max-width: 320px; width: 100%; text-align: center;
      animation: modalIn .3s cubic-bezier(.34,1.2,.64,1);
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 28px;
      letter-spacing: .05em; margin-bottom: 4px;
    }
    .modal-sub { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 20px; }
    .modal-qr { display: flex; justify-content: center; margin-bottom: 16px; }
    .modal-url {
      background: rgba(255,255,255,.06); border-radius: 10px;
      padding: 8px 12px; font-size: 10px; color: rgba(255,255,255,.4);
      word-break: break-all; margin-bottom: 18px;
    }
    .modal-items-label {
      font-size: 11px; color: rgba(255,255,255,.4); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .1em; text-align: left;
    }
    .modal-item-row {
      display: flex; justify-content: space-between; padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,.06); font-size: 13px;
      text-align: left;
    }
    .modal-total {
      display: flex; justify-content: space-between;
      padding: 8px 0 0; font-size: 15px; font-weight: 900;
    }
    .btn-close-modal {
      width: 100%; padding: 12px; border-radius: 12px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
      color: #fff; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 18px;
    }
    .btn-close-modal:hover { background: rgba(255,255,255,.17); }

    /* Cardápio modal */
    #cardapio-modal .modal-box { max-width: 480px; text-align: left; padding: 0; overflow: hidden; max-height: 90dvh; display: flex; flex-direction: column; }
    #cardapio-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(0,0,0,.5); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    #cardapio-body { overflow-y: auto; flex: 1; padding-bottom: 80px; }
    #cardapio-bottom-nav {
      position: sticky; bottom: 0; z-index: 10;
      background: rgba(0,0,0,.75); backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
    }
    #cardapio-modal .nav-btn { padding: 10px 2px; }

    /* Show cardápio button */
    #show-cardapio-btn {
      width: 100%; padding: 16px; border-radius: 16px;
      background: linear-gradient(135deg, #f5c842, #f09000);
      color: #000; font-family: inherit; font-size: 16px; font-weight: 900;
      cursor: pointer; border: none;
      box-shadow: 0 8px 32px rgba(245,200,66,.3);
      letter-spacing: .02em; margin-top: 12px;
    }
    #show-cardapio-btn:hover { filter: brightness(1.08); }

    /* ── CLIENT VIEW ── */
    #client-view { display: none; }
    #client-view.active { display: block; }
    #admin-view.hidden { display: none; }

    /* Client header */
    #client-header {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(0,0,0,.5); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    #client-mesa-badge {
      padding: 5px 14px; border-radius: 999px;
      background: rgba(245,200,66,.1); border: 1px solid rgba(245,200,66,.3);
      font-size: 11px; font-weight: 700; color: #f5c842;
    }
    #client-content { padding: 24px 16px; animation: fadeUp .5s ease; }
    .comanda-empty-box {
      text-align: center; padding: 40px 20px;
      background: rgba(255,255,255,.04); border-radius: 20px;
      border: 1px dashed rgba(255,255,255,.1);
    }
    .client-order-card {
      display: flex; align-items: center; gap: 12px; padding: 12px;
      border-radius: 16px; margin-bottom: 8px;
      background: rgba(255,255,255,.05); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.09);
    }
    .client-order-img { width: 52px; height: 64px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
    .client-order-img img { width: 100%; height: 100%; object-fit: cover; }
    .client-total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; margin-top: 6px;
      background: rgba(245,200,66,.08); border: 1px solid rgba(245,200,66,.25);
      border-radius: 16px;
    }

    /* Sync dot */
    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #86efac; animation: pulse 1.5s infinite;
      display: inline-block; margin-right: 6px;
    }
    .sync-badge {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
      padding: 4px 12px; border-radius: 999px;
      background: rgba(99,255,99,.1); border: 1px solid rgba(99,255,99,.2);
      font-size: 11px; color: #86efac;
    }

    /* Back btn */
    .btn-back {
      padding: 6px 14px; border-radius: 10px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
      color: #fff; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- BACKGROUND -->
<div id="bg-layer">
  <div id="bg-img"></div>
  <div id="bg-overlay"></div>
  <div id="bg-noise"></div>
</div>

<!-- ════════════════════════ ADMIN VIEW ════════════════════════ -->
<div id="admin-view">
  <div id="app">

    <!-- COMANDA BAR -->
    <div id="comanda-bar">
      <div class="label">Comandas — selecione para adicionar itens</div>
      <div id="comanda-scroll"></div>
    </div>

    <!-- HEADER -->
    <header id="main-header">
      <div>
        <div id="header-sub">Distribuidora</div>
        <h1>IceBox Premium</h1>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="section-pill"></div>
        <button id="gear-btn" title="Modo Edição">⚙️</button>
      </div>
    </header>

    <!-- EDIT BANNER -->
    <div id="edit-banner">✏️ Modo Edição ATIVO — clique em qualquer nome, preço ou URL de imagem para editar</div>

    <!-- HERO STRIP -->
    <div id="hero-strip">
      <div id="hero-section-name"></div>
      <div id="hero-comanda-info"></div>
    </div>

    <!-- PRODUCT LIST -->
    <main id="product-list"></main>

    <!-- BOTTOM NAV -->
    <div id="bottom-nav"></div>

    <!-- QR FLOAT -->
    <button id="qr-float-btn" title="QR Code da comanda">📱</button>

  </div>
</div>

<!-- ════════════════════════ CLIENT VIEW ════════════════════════ -->
<div id="client-view">
  <div id="app" style="max-width:480px;margin:0 auto;min-height:100dvh;position:relative;z-index:1">

    <!-- CLIENT HEADER -->
    <header id="client-header">
      <div>
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.4)">IceBox Premium</div>
        <h1 id="client-mesa-title" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;line-height:1.1"></h1>
      </div>
      <div id="client-mesa-badge">Comanda vazia</div>
    </header>

    <!-- CONTENT: COMANDA or MENU -->
    <div id="client-comanda-view">
      <div id="client-content"></div>
    </div>

    <div id="client-menu-view" style="display:none">
      <div id="cardapio-header">
        <div id="cardapio-active-label" style="font-size:11px;font-weight:700"></div>
        <button class="btn-back" onclick="closeClientMenu()">← Voltar</button>
      </div>
      <main id="cardapio-body"></main>
      <div id="cardapio-bottom-nav"></div>
    </div>

  </div>
</div>

<!-- ═══════════════ QR MODAL ═══════════════ -->
<div id="qr-modal" class="modal-overlay" onclick="closeQRModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">QR Code</div>
    <div class="modal-sub" id="qr-modal-sub"></div>
    <div class="modal-qr"><img id="qr-img" alt="QR Code" style="border-radius:8px" /></div>
    <div class="modal-url" id="qr-modal-url"></div>
    <div id="qr-items-section"></div>
    <button class="btn-close-modal" onclick="closeQRModal()">Fechar</button>
  </div>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────
let sections = loadSections();
let orders   = loadOrders();
let selectedComanda = 1;
let activeSection   = sections[0]?.id;
let editMode        = false;
let bgUrl           = sections[0]?.bg;
let bgTimeouts      = [];
let qrOpenMesa      = null;

// Client state
let clientMesa      = null;
let clientShowMenu  = false;
let clientActiveSection = null;
let clientBgUrl     = sections[0]?.bg;

// ─── STORAGE ─────────────────────────────────────────────────────────────
function loadSections() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
  return JSON.parse(JSON.stringify(INITIAL_SECTIONS));
}
function saveSections() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sections)); }
function loadOrders() {
  try { const s = localStorage.getItem(ORDERS_KEY); if (s) return JSON.parse(s); } catch {}
  return {};
}
function saveOrders() { localStorage.setItem(ORDERS_KEY, JSON.stringify(orders)); }

// ─── HELPERS ─────────────────────────────────────────────────────────────
function allProducts() {
  return sections.flatMap(s => s.products.map(p => ({ ...p, accent: s.accent })));
}
function parsePrice(str) {
  return parseFloat(str.replace("R$", "").replace(",", ".").trim()) || 0;
}
function fmtPrice(val) {
  return "R$ " + val.toFixed(2).replace(".", ",");
}
function getQty(mesa, productId) {
  return (orders[mesa] || []).find(i => i.id === productId)?.qty || 0;
}
function totalForMesa(mesa) {
  return (orders[mesa] || []).reduce((sum, item) => {
    const p = allProducts().find(x => x.id === item.id);
    return p ? sum + parsePrice(p.price) * item.qty : sum;
  }, 0);
}
function countForMesa(mesa) {
  return (orders[mesa] || []).reduce((s, i) => s + i.qty, 0);
}
function getActiveSec(secId) {
  return sections.find(s => s.id === secId) || sections[0];
}
function getQRUrl(mesa) {
  return `${location.origin}${location.pathname}?mesa=${mesa}`;
}

// ─── BG TRANSITION ───────────────────────────────────────────────────────
function transitionBg(newUrl) {
  if (newUrl === bgUrl) return;
  bgTimeouts.forEach(clearTimeout); bgTimeouts = [];
  const el = document.getElementById("bg-img");
  bgUrl = newUrl;
  el.style.filter = "blur(28px)";
  el.style.transform = "scale(1.07)";
  bgTimeouts.push(setTimeout(() => {
    el.style.backgroundImage = `url('${newUrl}')`;
    el.style.filter = "blur(6px)";
    el.style.transform = "scale(1.03)";
  }, 430));
  bgTimeouts.push(setTimeout(() => {
    el.style.filter = "blur(10px)";
  }, 900));
}

// ─── CSS VARIABLE HELPERS ────────────────────────────────────────────────
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function setAccent(accent) {
  document.documentElement.style.setProperty("--accent", accent);
  document.documentElement.style.setProperty("--accent-22", hexToRgba(accent, .13));
  document.documentElement.style.setProperty("--accent-55", hexToRgba(accent, .33));
  document.documentElement.style.setProperty("--accent-66", hexToRgba(accent, .4));
}

// ─── ADMIN RENDER ────────────────────────────────────────────────────────
function renderComandaBar() {
  const el = document.getElementById("comanda-scroll");
  const activeSec = getActiveSec(activeSection);
  setAccent(activeSec.accent);
  el.innerHTML = "";
  for (let n = 1; n <= 10; n++) {
    const btn = document.createElement("button");
    btn.className = "comanda-btn" + (n === selectedComanda ? " active" : "");
    const count = countForMesa(n);
    btn.innerHTML = String(n).padStart(3, "0") +
      (count > 0 ? `<span class="comanda-badge">${count}</span>` : "");
    btn.onclick = () => { selectedComanda = n; render(); };
    el.appendChild(btn);
  }
}

function renderHeader() {
  const activeSec = getActiveSec(activeSection);
  document.getElementById("section-pill").innerHTML = `${activeSec.emoji} ${activeSec.title}`;
  const gear = document.getElementById("gear-btn");
  gear.className = "gear-btn" + (editMode ? " active" : "");
  gear.style.cssText = editMode
    ? "background:rgba(245,200,66,.2);border:1.5px solid #f5c842;color:#f5c842;"
    : "background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.1);color:#fff;";
  gear.style.width = "42px"; gear.style.height = "42px"; gear.style.borderRadius = "50%";
  gear.style.display = "flex"; gear.style.alignItems = "center"; gear.style.justifyContent = "center";
  gear.style.cursor = "pointer"; gear.style.fontSize = "18px";

  document.getElementById("edit-banner").style.display = editMode ? "block" : "none";
  document.body.classList.toggle("edit-mode", editMode);
}

function renderHeroStrip() {
  const activeSec = getActiveSec(activeSection);
  const nameEl = document.getElementById("hero-section-name");
  nameEl.textContent = `${activeSec.emoji} ${activeSec.title}`;
  nameEl.style.color = activeSec.accent;

  const info = document.getElementById("hero-comanda-info");
  const cnt = countForMesa(selectedComanda);
  info.innerHTML = `Comanda <strong style="color:#fff">${String(selectedComanda).padStart(3,"0")}</strong>` +
    (cnt > 0 ? ` · ${cnt} itens · ${fmtPrice(totalForMesa(selectedComanda))}` : " · vazia");
}

function renderProducts() {
  const main = document.getElementById("product-list");
  main.innerHTML = "";

  sections.forEach((sec, si) => {
    const block = document.createElement("div");
    block.className = "section-block";
    block.dataset.section = sec.id;

    // Section header
    const hdr = document.createElement("div");
    hdr.className = "section-header";
    hdr.innerHTML = `
      <div class="section-divider" style="background:linear-gradient(to right,${sec.accent}77,transparent)"></div>
      <h2 class="section-title">${sec.emoji} ${sec.title}</h2>
      <div class="section-divider" style="background:linear-gradient(to left,${sec.accent}77,transparent)"></div>
    `;
    block.appendChild(hdr);

    // Product cards
    sec.products.forEach((p, pi) => {
      const qty = getQty(selectedComanda, p.id);
      const card = document.createElement("div");
      card.className = "product-card card-hover";
      card.style.animation = `cardIn .45s ease ${pi * 60}ms both`;

      card.innerHTML = `
        <div class="product-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy" />
          <div class="edit-img-overlay" data-sec="${sec.id}" data-pid="${p.id}">📷</div>
        </div>
        <div class="product-info">
          <div class="product-name" contenteditable="${editMode}" data-sec="${sec.id}" data-pid="${p.id}" data-field="name">${p.name}</div>
          <div class="product-sub">${p.sub}</div>
          <div class="product-price" style="color:${sec.accent}" contenteditable="${editMode}" data-sec="${sec.id}" data-pid="${p.id}" data-field="price">${p.price}</div>
        </div>
        <div class="qty-controls">
          <button class="btn-plus" style="background:${sec.accent}" data-sec="${sec.id}" data-pid="${p.id}">+</button>
          ${qty > 0 ? `
            <span class="qty-num" style="color:${sec.accent}">${qty}</span>
            <button class="btn-minus" data-pid="${p.id}">−</button>
          ` : ""}
        </div>
      `;

      // Events
      card.querySelector(".edit-img-overlay").onclick = (e) => {
        if (!editMode) return;
        const url = prompt("Nova URL da imagem:", p.img);
        if (url) { editProduct(sec.id, p.id, "img", url.trim()); render(); }
      };
      card.querySelector(".btn-plus").onclick = () => { incrementProduct(p.id); render(); };
      const minusBtn = card.querySelector(".btn-minus");
      if (minusBtn) minusBtn.onclick = () => { decrementProduct(p.id); render(); };

      card.querySelectorAll("[contenteditable=true]").forEach(el => {
        el.onblur = (e) => {
          editProduct(e.target.dataset.sec, parseInt(e.target.dataset.pid), e.target.dataset.field, e.target.textContent.trim());
        };
      });

      block.appendChild(card);
    });

    main.appendChild(block);
  });

  // IntersectionObserver
  setupIntersection();
}

function renderBottomNav(containerId = "bottom-nav", onNavClick = null) {
  const nav = document.getElementById(containerId);
  nav.innerHTML = "";
  sections.forEach(sec => {
    const isActive = sec.id === activeSection;
    const btn = document.createElement("button");
    btn.className = "nav-btn" + (isActive ? " active" : "");
    btn.style.setProperty("--nav-accent", sec.accent);
    if (isActive) btn.style.background = sec.accent + "22";
    btn.innerHTML = `<span class="emoji">${sec.emoji}</span><span class="label">${sec.title.substring(0,5)}</span>`;
    btn.onclick = onNavClick
      ? () => onNavClick(sec.id)
      : () => {
          document.querySelector(`[data-section="${sec.id}"]`)?.scrollIntoView({ behavior: "smooth", block: "start" });
        };
    nav.appendChild(btn);
  });
}

function render() {
  const activeSec = getActiveSec(activeSection);
  setAccent(activeSec.accent);
  renderComandaBar();
  renderHeader();
  renderHeroStrip();
  renderProducts();
  renderBottomNav("bottom-nav");
  transitionBg(activeSec.bg);
}

// ─── INTERSECTION OBSERVER ───────────────────────────────────────────────
let observer = null;
function setupIntersection() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.dataset.section;
        if (id && id !== activeSection) {
          activeSection = id;
          const sec = getActiveSec(id);
          setAccent(sec.accent);
          transitionBg(sec.bg);
          // Update hero + nav + pill without full re-render
          renderHeroStrip();
          document.getElementById("section-pill").textContent = `${sec.emoji} ${sec.title}`;
          renderBottomNav("bottom-nav");
        }
      }
    });
  }, { threshold: 0.25, rootMargin: "-80px 0px -40% 0px" });
  document.querySelectorAll(".section-block[data-section]").forEach(el => observer.observe(el));
}

// ─── COMANDA ACTIONS ─────────────────────────────────────────────────────
function incrementProduct(productId) {
  const cur = orders[selectedComanda] || [];
  const exists = cur.find(i => i.id === productId);
  orders[selectedComanda] = exists
    ? cur.map(i => i.id === productId ? { ...i, qty: i.qty + 1 } : i)
    : [...cur, { id: productId, qty: 1 }];
  saveOrders();
}
function decrementProduct(productId) {
  const cur = orders[selectedComanda] || [];
  orders[selectedComanda] = cur.map(i => i.id === productId ? { ...i, qty: i.qty - 1 } : i).filter(i => i.qty > 0);
  saveOrders();
}
function editProduct(secId, productId, field, value) {
  sections = sections.map(s => s.id === secId ? {
    ...s, products: s.products.map(p => p.id == productId ? { ...p, [field]: value } : p)
  } : s);
  saveSections();
}

// ─── QR MODAL ────────────────────────────────────────────────────────────
function openQRModal(mesa) {
  qrOpenMesa = mesa;
  const url = getQRUrl(mesa);
  document.getElementById("qr-modal-sub").innerHTML = `Comanda <strong style="color:#f5c842">${String(mesa).padStart(3,"0")}</strong>`;
  document.getElementById("qr-img").src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}&bgcolor=111111&color=ffffff&format=svg`;
  document.getElementById("qr-img").width = 160; document.getElementById("qr-img").height = 160;
  document.getElementById("qr-modal-url").textContent = url;

  const items = orders[mesa] || [];
  const sec = document.getElementById("qr-items-section");
  if (items.length > 0) {
    let html = `<div class="modal-items-label">Itens na comanda</div>`;
    items.forEach(item => {
      const p = allProducts().find(x => x.id === item.id);
      if (!p) return;
      const val = parsePrice(p.price) * item.qty;
      html += `<div class="modal-item-row"><span>${p.name} <span style="color:rgba(255,255,255,.4)">×${item.qty}</span></span><span style="color:${p.accent};font-weight:700">${fmtPrice(val)}</span></div>`;
    });
    html += `<div class="modal-total"><span>Total</span><span style="color:#f5c842">${fmtPrice(totalForMesa(mesa))}</span></div>`;
    sec.innerHTML = html;
  } else {
    sec.innerHTML = "";
  }
  document.getElementById("qr-modal").classList.add("open");
}
function closeQRModal(e) {
  if (!e || e.target === document.getElementById("qr-modal") || !e.target) {
    document.getElementById("qr-modal").classList.remove("open");
  }
}

// ─── GEAR BUTTON ─────────────────────────────────────────────────────────
document.getElementById("gear-btn").onclick = () => {
  editMode = !editMode;
  render();
};

// ─── QR FLOAT ────────────────────────────────────────────────────────────
document.getElementById("qr-float-btn").onclick = () => openQRModal(selectedComanda);

// ════════════════════════ CLIENT VIEW ════════════════════════════════════
let clientSyncInterval = null;

function initClientView(mesa) {
  clientMesa = mesa;
  document.getElementById("admin-view").classList.add("hidden");
  document.getElementById("client-view").classList.add("active");

  renderClientHeader();
  renderClientComanda();
  renderClientMenu();

  // Poll every 2s
  clientSyncInterval = setInterval(() => {
    sections = loadSections();
    orders   = loadOrders();
    renderClientHeader();
    renderClientComanda();
  }, 2000);
}

function renderClientHeader() {
  document.getElementById("client-mesa-title").innerHTML =
    `Mesa <span style="color:#f5c842">${String(clientMesa).padStart(3,"0")}</span>`;
  const items = orders[clientMesa] || [];
  const badge = document.getElementById("client-mesa-badge");
  badge.textContent = items.length > 0
    ? `${items.reduce((s,i)=>s+i.qty,0)} itens`
    : "Comanda vazia";
}

function renderClientComanda() {
  const content = document.getElementById("client-content");
  const items = orders[clientMesa] || [];

  let html = `
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.06em;line-height:1">Sua Comanda</div>
      <div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:4px">Mesa ${String(clientMesa).padStart(3,"0")} · Atualiza a cada 2s</div>
      <div class="sync-badge"><span class="sync-dot"></span>Sincronizado com o caixa</div>
    </div>
  `;

  if (items.length === 0) {
    html += `
      <div class="comanda-empty-box">
        <div style="font-size:48px;margin-bottom:12px">🛒</div>
        <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,.6)">Comanda vazia</div>
        <div style="font-size:13px;color:rgba(255,255,255,.3);margin-top:6px">Os itens adicionados pelo caixa aparecerão aqui</div>
      </div>
    `;
  } else {
    let total = 0;
    items.forEach((item, idx) => {
      const p = allProducts().find(x => x.id === item.id);
      if (!p) return;
      const val = parsePrice(p.price) * item.qty;
      total += val;
      html += `
        <div class="client-order-card card-hover" style="animation:cardIn .4s ease ${idx*60}ms both">
          <div class="client-order-img"><img src="${p.img}" alt="${p.name}" /></div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:800">${p.name}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">${p.sub}</div>
            <div style="font-size:13px;font-weight:700;color:${p.accent};margin-top:4px">${p.price} × ${item.qty}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:900;color:${p.accent}">${fmtPrice(val)}</div>
          </div>
        </div>
      `;
    });
    html += `
      <div class="client-total-row">
        <span style="font-size:16px;font-weight:700">Total</span>
        <span style="font-size:22px;font-weight:900;color:#f5c842;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em">${fmtPrice(total)}</span>
      </div>
    `;
  }

  html += `<button id="show-cardapio-btn" onclick="openClientMenu()">🍺 Ver Cardápio Digital</button>`;
  content.innerHTML = html;
}

function renderClientMenu() {
  const body = document.getElementById("cardapio-body");
  body.innerHTML = "";

  sections.forEach((sec, si) => {
    const block = document.createElement("div");
    block.className = "section-block";
    block.dataset.section = sec.id;

    const hdr = document.createElement("div");
    hdr.className = "section-header";
    hdr.innerHTML = `
      <div class="section-divider" style="background:linear-gradient(to right,${sec.accent}77,transparent)"></div>
      <h2 class="section-title">${sec.emoji} ${sec.title}</h2>
      <div class="section-divider" style="background:linear-gradient(to left,${sec.accent}77,transparent)"></div>
    `;
    block.appendChild(hdr);

    sec.products.forEach((p, pi) => {
      const card = document.createElement("div");
      card.className = "product-card card-hover";
      card.style.animation = `cardIn .45s ease ${pi * 60}ms both`;
      card.innerHTML = `
        <div class="product-img-wrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy" />
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-sub">${p.sub}</div>
          <div class="product-price" style="color:${sec.accent}">${p.price}</div>
        </div>
      `;
      block.appendChild(card);
    });
    body.appendChild(block);
  });

  // bottom nav
  const nav = document.getElementById("cardapio-bottom-nav");
  nav.innerHTML = "";
  sections.forEach(sec => {
    const btn = document.createElement("button");
    btn.className = "nav-btn";
    btn.style.setProperty("--nav-accent", sec.accent);
    btn.innerHTML = `<span class="emoji">${sec.emoji}</span><span class="label">${sec.title.substring(0,5)}</span>`;
    btn.onclick = () => {
      document.querySelector(`#cardapio-body [data-section="${sec.id}"]`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    };
    nav.appendChild(btn);
  });

  // IntersectionObserver for cardápio
  const menuObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.dataset.section;
        clientActiveSection = id;
        const sec = sections.find(s => s.id === id) || sections[0];
        transitionBg(sec.bg);
        const label = document.getElementById("cardapio-active-label");
        if (label) { label.textContent = `${sec.emoji} ${sec.title}`; label.style.color = sec.accent; }
        nav.querySelectorAll(".nav-btn").forEach((b, i) => {
          const s = sections[i];
          const active = s.id === id;
          b.classList.toggle("active", active);
          b.style.background = active ? s.accent + "22" : "transparent";
          b.style.borderTopColor = active ? s.accent : "transparent";
        });
      }
    });
  }, { threshold: 0.25, rootMargin: "-80px 0px -40% 0px" });
  body.querySelectorAll("[data-section]").forEach(el => menuObs.observe(el));
}

function openClientMenu() {
  document.getElementById("client-comanda-view").style.display = "none";
  document.getElementById("client-menu-view").style.display = "block";
  renderClientMenu();
}
function closeClientMenu() {
  document.getElementById("client-comanda-view").style.display = "block";
  document.getElementById("client-menu-view").style.display = "none";
  renderClientComanda();
}

// ─── INIT ─────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const mesaParam = params.get("mesa");

// Set initial bg
const bgEl = document.getElementById("bg-img");
bgEl.style.backgroundImage = `url('${sections[0].bg}')`;
bgEl.style.filter = "blur(10px)";
bgEl.style.transform = "scale(1.03)";

if (mesaParam !== null) {
  initClientView(parseInt(mesaParam, 10));
} else {
  render();
}
</script>
